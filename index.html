<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinema Ambrosia</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Georgia', 'Garamond', serif;
            background: #f5f1ed;
            color: #3a3a3a;
            min-height: 100vh;
            display: flex;
        }
        
        .sidebar {
            width: 240px;
            background: #e8e4df;
            border-right: 1px solid #d0cac4;
            padding: 50px 30px;
            overflow-y: auto;
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            display: flex;
            flex-direction: column;
        }
        
        .sidebar h2 {
            color: #3a3a3a;
            margin-bottom: 40px;
            font-size: 0.9em;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: normal;
        }
        
        .menu-items {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .menu-item {
            padding: 12px 0;
            background: transparent;
            border: none;
            border-bottom: 1px solid transparent;
            color: #6b6b6b;
            cursor: pointer;
            transition: all 0.5s ease;
            font-weight: normal;
            text-align: left;
            font-size: 0.95em;
            letter-spacing: 0.5px;
            font-family: 'Georgia', serif;
        }
        
        .menu-item:hover {
            border-bottom-color: #3a3a3a;
            color: #3a3a3a;
        }
        
        .menu-item.active {
            border-bottom-color: #8b8680;
            color: #3a3a3a;
        }
        
        .main-content {
            margin-left: 240px;
            padding: 80px 60px;
            width: calc(100% - 240px);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }
        
        .content-header {
            text-align: center;
            margin-bottom: 80px;
        }
        
        h1 {
            color: #3a3a3a;
            font-size: 3.5em;
            margin-bottom: 15px;
            font-weight: normal;
            letter-spacing: 2px;
        }
        
        .subtitle {
            color: #8b8680;
            font-size: 0.95em;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        
        .question {
            color: #5a5a5a;
            font-size: 1.8em;
            font-weight: normal;
            text-align: center;
            margin-bottom: 60px;
            line-height: 1.6;
            letter-spacing: 0.5px;
        }
        
        .tags-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 60px;
            justify-content: center;
        }
        
        .tag-btn {
            padding: 12px 24px;
            border: 1px solid #8b8680;
            background: transparent;
            color: #6b6b6b;
            border-radius: 0;
            cursor: pointer;
            font-size: 0.95em;
            font-weight: normal;
            transition: all 0.5s ease;
            font-family: 'Georgia', serif;
            letter-spacing: 0.5px;
        }
        
        .tag-btn:hover {
            background: #d0cac4;
            color: #3a3a3a;
            border-color: #8b8680;
        }
        
        .tag-btn.active {
            background: #8b8680;
            color: #f5f1ed;
            border-color: #8b8680;
        }
        
        .movies-container {
            display: flex;
            flex-direction: column;
            gap: 30px;
            max-width: 800px;
            margin: 0 auto;
            margin-top: 40px;
        }
        
        .movie-card {
            background: transparent;
            border-left: 2px solid #8b8680;
            padding: 20px 0 20px 30px;
            border-radius: 0;
            transition: all 0.5s ease;
        }
        
        .movie-card:hover {
            background: transparent;
            border-left-color: #5a5a5a;
            padding-left: 35px;
        }
        
        .movie-title {
            color: #3a3a3a;
            font-size: 1.3em;
            font-weight: normal;
            margin-bottom: 10px;
            letter-spacing: 0.3px;
        }
        
        .movie-tag {
            display: inline-block;
            background: transparent;
            color: #8b8680;
            padding: 5px 10px;
            border-radius: 0;
            font-size: 0.85em;
            font-weight: normal;
            border: 1px solid #d0cac4;
            letter-spacing: 0.5px;
        }
        
        .empty-state {
            text-align: center;
            color: #8b8680;
            padding: 60px 20px;
            font-size: 1.1em;
        }
        
        .page-content {
            display: none;
        }
        
        .page-content.active {
            display: block;
            animation: fadeIn 0.8s ease;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        
        .all-movies-list {
            max-width: 900px;
            margin: 0 auto;
        }
        
        .all-movies-title {
            color: #3a3a3a;
            font-size: 2.5em;
            margin-bottom: 60px;
            text-align: center;
            font-weight: normal;
            letter-spacing: 1px;
        }
        
        .movies-list-container {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }
        
        .movie-list-item {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 15px 0;
            border-bottom: 1px solid #e0dcd7;
        }
        
        .movie-list-title {
            color: #3a3a3a;
            font-size: 1.2em;
            font-weight: normal;
            flex: 1;
        }
        
        .movie-list-tag {
            color: #8b8680;
            font-size: 0.9em;
            text-align: right;
            min-width: 120px;
        }
        
        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                border-right: none;
                border-bottom: 1px solid #d0cac4;
                padding: 30px;
            }
            
            .main-content {
                margin-left: 0;
                width: 100%;
                padding: 40px 20px;
            }
            
            h1 {
                font-size: 2.5em;
            }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>Menu</h2>
        <div class="menu-items">
            <button class="menu-item active" onclick="showMainPage()">Main</button>
            <button class="menu-item" onclick="showAllMovies()">Movies List</button>
        </div>
    </div>
    
    <div class="main-content">
        <div class="page-content active" id="mainPage">
            <div class="content-header">
                <h1>Cinema Ambrosia</h1>
                <p class="subtitle">Explore</p>
            </div>
            <div class="question">What do you want to watch?</div>
            <div class="tags-container" id="tagsContainer"></div>
            <div class="movies-container" id="moviesContainer"></div>
        </div>
        
        <div class="page-content" id="allMoviesPage">
            <div class="all-movies-title">All Movies</div>
            <div class="all-movies-list" id="allMoviesList"></div>
        </div>
    </div>

    <script>
        let allMovies = [];
        let selectedTag = null;

        // Load movies from JSON
        async function loadMovies() {
            try {
                const response = await fetch('movies.json');
                allMovies = await response.json();
                initializeApp();
            } catch (error) {
                console.error('Error loading movies:', error);
                document.getElementById('moviesContainer').innerHTML = 
                    '<div class="empty-state">Error loading movies data</div>';
            }
        }

        function initializeApp() {
            renderTags();
        }

        function renderTags() {
            const tagsContainer = document.getElementById('tagsContainer');
            const uniqueTags = [...new Set(allMovies.map(m => m.tag))].sort();
            
            tagsContainer.innerHTML = uniqueTags.map(tag => 
                `<button class="tag-btn" data-tag="${tag}" onclick="selectTag('${tag}')">${tag}</button>`
            ).join('');
        }

        function selectTag(tag) {
            selectedTag = selectedTag === tag ? null : tag;
            
            // Update tag button states
            document.querySelectorAll('.tag-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.tag === selectedTag);
            });
            
            renderMovies();
        }

        function renderMovies() {
            const moviesContainer = document.getElementById('moviesContainer');
            
            if (!selectedTag) {
                moviesContainer.innerHTML = '';
                return;
            }
            
            let filtered = allMovies.filter(movie => movie.tag === selectedTag);
            
            if (filtered.length === 0) {
                moviesContainer.innerHTML = '<div class="empty-state">No movies found</div>';
                return;
            }
            
            moviesContainer.innerHTML = filtered.map(movie => `
                <div class="movie-card">
                    <div class="movie-title">${movie.title}</div>
                    <span class="movie-tag">${movie.tag}</span>
                </div>
            `).join('');
        }

        function showMainPage() {
            document.getElementById('mainPage').classList.add('active');
            document.getElementById('allMoviesPage').classList.remove('active');
            updateMenuItems('main');
        }

        function showAllMovies() {
            document.getElementById('mainPage').classList.remove('active');
            document.getElementById('allMoviesPage').classList.add('active');
            updateMenuItems('movies');
            renderAllMovies();
        }

        function updateMenuItems(page) {
            const items = document.querySelectorAll('.menu-item');
            items.forEach(item => item.classList.remove('active'));
            
            if (page === 'main') {
                items[0].classList.add('active');
            } else if (page === 'movies') {
                items[1].classList.add('active');
            }
        }

        function renderAllMovies() {
            const allMoviesList = document.getElementById('allMoviesList');
            
            const moviesHtml = allMovies.map(movie => `
                <div class="movie-list-item">
                    <div class="movie-list-title">${movie.title}</div>
                    <div class="movie-list-tag">${movie.tag}</div>
                </div>
            `).join('');
            
            allMoviesList.innerHTML = `<div class="movies-list-container">${moviesHtml}</div>`;
        }

        // Load movies on page load
        loadMovies();
    </script>
</body>
</html>
