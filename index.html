<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Tag Explorer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a1a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
        }
        
        .sidebar {
            width: 280px;
            background: #0d0d0d;
            border-right: 1px solid #333;
            padding: 30px 20px;
            overflow-y: auto;
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
        }
        
        .sidebar h2 {
            color: #fff;
            margin-bottom: 25px;
            font-size: 1.3em;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .menu-items {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .menu-item {
            padding: 12px 16px;
            background: #222;
            border: 1px solid #333;
            color: #b0b0b0;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
            text-align: left;
        }
        
        .menu-item:hover {
            background: #2a2a2a;
            border-color: #667eea;
            color: #e0e0e0;
        }
        
        .menu-item.active {
            background: #667eea;
            border-color: #667eea;
            color: white;
        }
        
        .main-content {
            margin-left: 280px;
            padding: 60px 40px;
            width: calc(100% - 280px);
            min-height: 100vh;
        }
        
        .content-header {
            text-align: center;
            margin-bottom: 50px;
        }
        
        h1 {
            color: #fff;
            font-size: 3em;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #888;
            font-size: 1.1em;
        }
        
        .question {
            color: #667eea;
            font-size: 2em;
            font-weight: 600;
            text-align: center;
            margin-bottom: 40px;
        }
        
        .tags-container {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 50px;
            justify-content: center;
        }
        
        .tag-btn {
            padding: 10px 20px;
            border: 2px solid #667eea;
            background: transparent;
            color: #667eea;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .tag-btn:hover {
            background: rgba(102, 126, 234, 0.1);
            transform: translateY(-2px);
        }
        
        .tag-btn.active {
            background: #667eea;
            color: white;
        }
        
        .movies-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 700px;
            margin: 0 auto;
            margin-top: 40px;
        }
        
        .movie-card {
            background: #222;
            border-left: 4px solid #667eea;
            padding: 20px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        
        .movie-card:hover {
            background: #2a2a2a;
            transform: translateX(5px);
        }
        
        .movie-title {
            color: #fff;
            font-size: 1.3em;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .movie-tag {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.85em;
            font-weight: 600;
        }
        
        .empty-state {
            text-align: center;
            color: #666;
            padding: 40px 20px;
            font-size: 1.1em;
        }
        
        .page-content {
            display: none;
        }
        
        .page-content.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .all-movies-list {
            max-width: 700px;
            margin: 0 auto;
        }
        
        .all-movies-title {
            color: #fff;
            font-size: 2em;
            margin-bottom: 40px;
            text-align: center;
        }
        
        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                border-right: none;
                border-bottom: 1px solid #333;
                padding: 20px;
            }
            
            .main-content {
                margin-left: 0;
                width: 100%;
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>📋 Menu</h2>
        <div class="menu-items">
            <button class="menu-item active" onclick="showMainPage()">Movies List</button>
        </div>
    </div>
    
    <div class="main-content">
        <div class="page-content active" id="mainPage">
            <div class="content-header">
                <h1>🎬 Movies</h1>
                <p class="subtitle">Explore by genre</p>
            </div>
            <div class="question">What do you want to watch?</div>
            <div class="tags-container" id="tagsContainer"></div>
            <div class="movies-container" id="moviesContainer"></div>
        </div>
        
        <div class="page-content" id="allMoviesPage">
            <div class="all-movies-title">All Movies</div>
            <div class="all-movies-list" id="allMoviesList"></div>
        </div>
    </div>

    <script>
        let allMovies = [];
        let selectedTag = null;

        // Load movies from JSON
        async function loadMovies() {
            try {
                const response = await fetch('movies.json');
                allMovies = await response.json();
                initializeApp();
            } catch (error) {
                console.error('Error loading movies:', error);
                document.getElementById('moviesContainer').innerHTML = 
                    '<div class="empty-state">Error loading movies data</div>';
            }
        }

        function initializeApp() {
            renderTags();
        }

        function renderTags() {
            const tagsContainer = document.getElementById('tagsContainer');
            const uniqueTags = [...new Set(allMovies.map(m => m.tag))].sort();
            
            tagsContainer.innerHTML = uniqueTags.map(tag => 
                `<button class="tag-btn" data-tag="${tag}" onclick="selectTag('${tag}')">${tag}</button>`
            ).join('');
        }

        function selectTag(tag) {
            selectedTag = selectedTag === tag ? null : tag;
            
            // Update tag button states
            document.querySelectorAll('.tag-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.tag === selectedTag);
            });
            
            renderMovies();
        }

        function renderMovies() {
            const moviesContainer = document.getElementById('moviesContainer');
            
            if (!selectedTag) {
                moviesContainer.innerHTML = '';
                return;
            }
            
            let filtered = allMovies.filter(movie => movie.tag === selectedTag);
            
            if (filtered.length === 0) {
                moviesContainer.innerHTML = '<div class="empty-state">No movies found</div>';
                return;
            }
            
            moviesContainer.innerHTML = filtered.map(movie => `
                <div class="movie-card">
                    <div class="movie-title">${movie.title}</div>
                    <span class="movie-tag">${movie.tag}</span>
                </div>
            `).join('');
        }

        function showMainPage() {
            document.getElementById('mainPage').classList.add('active');
            document.getElementById('allMoviesPage').classList.remove('active');
            document.querySelector('.menu-item').classList.add('active');
        }

        function showAllMovies() {
            document.getElementById('mainPage').classList.remove('active');
            document.getElementById('allMoviesPage').classList.add('active');
            renderAllMovies();
        }

        function renderAllMovies() {
            const allMoviesList = document.getElementById('allMoviesList');
            
            const moviesHtml = allMovies.map(movie => `
                <div class="movie-card">
                    <div class="movie-title">${movie.title}</div>
                    <span class="movie-tag">${movie.tag}</span>
                </div>
            `).join('');
            
            allMoviesList.innerHTML = `<div class="movies-container">${moviesHtml}</div>`;
        }

        // Load movies on page load
        loadMovies();
    </script>
</body>
</html>
